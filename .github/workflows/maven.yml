name: Test Automation Workflow

on:
  schedule:
    - cron: 00 18 * * *
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Running Test Automation Framework with Maven
      run: mvn test -X -Dbrowser=chrome -DisLambdaTest=false -DisHeadless=true

      
    - name: Upload Test Logs
      if: always()
      uses: actions/upload-artifact@v7.0.1
      with:
        name: Test logs
        path: logs/


    - name: Upload Screenshots
      if: always()
      uses: actions/upload-artifact@v7.0.1
      with:
        name: Screenshots
        path: Screenshots/
        

    
    - name: Upload Test Reports
      if: always()
      uses: actions/upload-artifact@v7.0.1
      with:
        name: Test Reports
        path: report.html

    - name: Upload Test Reports
      run: echo "Test Execution Completed"
    
    - name: Copy report to gh-pages Folder
      if: always()
      run: 
        mkdir -p public/extent-reports
        cp -R report.html/extent-reports/
        cp -R Screenshots/public/extent-reports/Screenshots/
        ls -l


    - name: Deploy to GitHub Pages
      if: always()
      uses: JamesIves/github-pages-deploy-action@v4.8.0
      with:
        folder: public/extent-reports/
        token: ${{secrets.PAT123}}
        clean: true
        
      






      
